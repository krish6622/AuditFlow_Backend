# Local dev: Postgres + backend API (AuditFlow_Backend).
# Usage (run from this folder):
#   cp .env.example .env   (then set JWT_SECRET_KEY)
#   docker compose up --build
#   docker compose exec api python -m app.cli seed-superadmin
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: elangovan
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/elangovan
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-only-insecure-secret-change-me}
      ENVIRONMENT: development
      DEBUG: "true"
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
    ports:
      - "8000:8000"

volumes:
  pgdata:
